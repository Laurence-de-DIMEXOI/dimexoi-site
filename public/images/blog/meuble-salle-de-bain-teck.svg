<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Teak wood grain pattern -->
    <pattern id="woodGrain" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <rect width="200" height="200" fill="#B99470"/>
      <path d="M0 20 Q50 15 100 22 T200 18" stroke="#A6825E" stroke-width="0.8" fill="none" opacity="0.5"/>
      <path d="M0 40 Q60 35 120 42 T200 38" stroke="#A6825E" stroke-width="0.6" fill="none" opacity="0.4"/>
      <path d="M0 60 Q40 58 80 63 T200 58" stroke="#C4A882" stroke-width="0.5" fill="none" opacity="0.3"/>
      <path d="M0 80 Q70 75 140 82 T200 78" stroke="#A6825E" stroke-width="0.7" fill="none" opacity="0.45"/>
      <path d="M0 100 Q50 98 100 103 T200 98" stroke="#A6825E" stroke-width="0.6" fill="none" opacity="0.35"/>
      <path d="M0 120 Q60 115 120 122 T200 118" stroke="#C4A882" stroke-width="0.5" fill="none" opacity="0.3"/>
      <path d="M0 140 Q45 138 90 143 T200 138" stroke="#A6825E" stroke-width="0.7" fill="none" opacity="0.4"/>
      <path d="M0 160 Q55 155 110 162 T200 158" stroke="#A6825E" stroke-width="0.6" fill="none" opacity="0.35"/>
      <path d="M0 180 Q65 178 130 183 T200 178" stroke="#C4A882" stroke-width="0.5" fill="none" opacity="0.25"/>
    </pattern>

    <!-- Subtle gradient overlay -->
    <linearGradient id="warmOverlay" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2C3E2D" stop-opacity="0.92"/>
      <stop offset="50%" stop-color="#2C3E2D" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#1a2a1b" stop-opacity="0.88"/>
    </linearGradient>

    <linearGradient id="goldAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B99470"/>
      <stop offset="50%" stop-color="#D4AD7A"/>
      <stop offset="100%" stop-color="#B99470"/>
    </linearGradient>

    <!-- Leaf icon -->
    <symbol id="leaf" viewBox="0 0 24 24">
      <path d="M17 8C8 10 5.9 16.17 3.82 21.34L5.71 22.66C7.26 19.14 9.44 16 12 14C14.5 12 17.11 10.44 18 8L17 8Z" fill="#B99470" opacity="0.7"/>
    </symbol>

    <!-- Water drop -->
    <symbol id="drop" viewBox="0 0 24 24">
      <path d="M12 2C12 2 5 11 5 15.5C5 19.09 8.13 22 12 22C15.87 22 19 19.09 19 15.5C19 11 12 2 12 2Z" fill="none" stroke="#B99470" stroke-width="1.5" opacity="0.5"/>
    </symbol>
  </defs>

  <!-- Background with wood texture -->
  <rect width="1200" height="630" fill="url(#woodGrain)"/>

  <!-- Dark overlay -->
  <rect width="1200" height="630" fill="url(#warmOverlay)"/>

  <!-- Subtle pattern dots -->
  <g opacity="0.04">
    <circle cx="100" cy="100" r="2" fill="white"/>
    <circle cx="200" cy="150" r="2" fill="white"/>
    <circle cx="300" cy="80" r="2" fill="white"/>
    <circle cx="400" cy="200" r="2" fill="white"/>
    <circle cx="500" cy="120" r="2" fill="white"/>
    <circle cx="600" cy="180" r="2" fill="white"/>
    <circle cx="700" cy="90" r="2" fill="white"/>
    <circle cx="800" cy="160" r="2" fill="white"/>
    <circle cx="900" cy="110" r="2" fill="white"/>
    <circle cx="1000" cy="190" r="2" fill="white"/>
    <circle cx="1100" cy="130" r="2" fill="white"/>
    <circle cx="150" cy="400" r="2" fill="white"/>
    <circle cx="350" cy="450" r="2" fill="white"/>
    <circle cx="550" cy="380" r="2" fill="white"/>
    <circle cx="750" cy="420" r="2" fill="white"/>
    <circle cx="950" cy="390" r="2" fill="white"/>
    <circle cx="1050" cy="460" r="2" fill="white"/>
  </g>

  <!-- Decorative leaves top-right -->
  <g transform="translate(950, 30) scale(2.5)" opacity="0.15">
    <use href="#leaf" x="0" y="0" width="24" height="24"/>
  </g>
  <g transform="translate(1000, 60) scale(2) rotate(30)" opacity="0.1">
    <use href="#leaf" x="0" y="0" width="24" height="24"/>
  </g>
  <g transform="translate(1080, 20) scale(1.8) rotate(-15)" opacity="0.12">
    <use href="#leaf" x="0" y="0" width="24" height="24"/>
  </g>

  <!-- Decorative leaves bottom-left -->
  <g transform="translate(30, 480) scale(2.2) rotate(180)" opacity="0.12">
    <use href="#leaf" x="0" y="0" width="24" height="24"/>
  </g>
  <g transform="translate(80, 520) scale(1.8) rotate(200)" opacity="0.1">
    <use href="#leaf" x="0" y="0" width="24" height="24"/>
  </g>

  <!-- Water drops subtle -->
  <g transform="translate(100, 80) scale(1.5)" opacity="0.08">
    <use href="#drop" x="0" y="0" width="24" height="24"/>
  </g>
  <g transform="translate(1050, 450) scale(1.2)" opacity="0.06">
    <use href="#drop" x="0" y="0" width="24" height="24"/>
  </g>

  <!-- Top gold line -->
  <rect x="80" y="160" width="60" height="2" fill="url(#goldAccent)" rx="1"/>

  <!-- Category label -->
  <text x="80" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#B99470" letter-spacing="4" text-transform="uppercase">GUIDE COMPLET</text>

  <!-- Main title -->
  <text x="80" y="265" font-family="Georgia, 'Times New Roman', serif" font-size="48" fill="#F5F0EB" font-weight="bold">
    <tspan x="80" dy="0">Meuble salle de bain</tspan>
    <tspan x="80" dy="62">en teck</tspan>
  </text>

  <!-- Subtitle -->
  <text x="80" y="380" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#C4B69A" opacity="0.8">
    <tspan x="80" dy="0">Comment bien choisir ? Dimensions, finitions,</tspan>
    <tspan x="80" dy="28">entretien — tout ce qu'il faut savoir.</tspan>
  </text>

  <!-- Bottom gold line -->
  <rect x="80" y="440" width="40" height="2" fill="url(#goldAccent)" rx="1"/>

  <!-- Finish swatches preview -->
  <g transform="translate(80, 470)">
    <text font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#B99470" letter-spacing="3" y="0">5 FINITIONS</text>
    <circle cx="8" cy="22" r="8" fill="#B99470" opacity="0.9"/>
    <circle cx="30" cy="22" r="8" fill="#C4A882" opacity="0.9"/>
    <circle cx="52" cy="22" r="8" fill="#E8E0D4" opacity="0.9"/>
    <circle cx="74" cy="22" r="8" fill="#3A3A3A" opacity="0.9"/>
    <circle cx="96" cy="22" r="8" fill="#783D19" opacity="0.9"/>
  </g>

  <!-- DIMEXOI logo area bottom-right -->
  <g transform="translate(900, 530)">
    <rect x="0" y="0" width="220" height="50" rx="0" fill="none"/>
    <text x="110" y="18" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#F5F0EB" text-anchor="middle" letter-spacing="6" font-weight="bold">DIMEXOI</text>
    <text x="110" y="38" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#B99470" text-anchor="middle" letter-spacing="3">DEPUIS 1995 · LA RÉUNION</text>
  </g>

  <!-- Teak furniture illustration (minimalist vanity) -->
  <g transform="translate(720, 180)" opacity="0.15">
    <!-- Vanity body -->
    <rect x="0" y="60" width="200" height="120" rx="3" fill="none" stroke="#D4AD7A" stroke-width="1.5"/>
    <!-- Drawers -->
    <line x1="0" y1="100" x2="200" y2="100" stroke="#D4AD7A" stroke-width="1"/>
    <line x1="0" y1="140" x2="200" y2="140" stroke="#D4AD7A" stroke-width="1"/>
    <!-- Drawer handles -->
    <line x1="90" y1="77" x2="110" y2="77" stroke="#D4AD7A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="90" y1="117" x2="110" y2="117" stroke="#D4AD7A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="90" y1="157" x2="110" y2="157" stroke="#D4AD7A" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Legs -->
    <line x1="15" y1="180" x2="15" y2="210" stroke="#D4AD7A" stroke-width="2"/>
    <line x1="185" y1="180" x2="185" y2="210" stroke="#D4AD7A" stroke-width="2"/>
    <!-- Basin -->
    <ellipse cx="100" cy="55" rx="70" ry="12" fill="none" stroke="#D4AD7A" stroke-width="1.5"/>
    <!-- Faucet -->
    <path d="M100 43 L100 20 L115 20 L115 30" fill="none" stroke="#D4AD7A" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Mirror -->
    <rect x="30" y="-60" width="140" height="100" rx="70" fill="none" stroke="#D4AD7A" stroke-width="1"/>
  </g>

  <!-- Thin border frame -->
  <rect x="20" y="20" width="1160" height="590" rx="0" fill="none" stroke="#B99470" stroke-width="0.5" opacity="0.2"/>
</svg>
