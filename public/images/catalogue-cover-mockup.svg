<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <!-- Fond bois chaleureux -->
    <linearGradient id="wood" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c1a0e;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#3d2510;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0f07;stop-opacity:1" />
    </linearGradient>
    <!-- Grain bois lignes -->
    <pattern id="grain" x="0" y="0" width="4" height="200" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="200" stroke="#5a3515" stroke-width="0.5" stroke-opacity="0.3"/>
    </pattern>
    <!-- Ombre sous le catalogue -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <!-- Ombre douce pour texte -->
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <!-- Reflet catalogue -->
    <linearGradient id="coverSheen" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.12" />
      <stop offset="50%" style="stop-color:#fff;stop-opacity:0.03" />
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0" />
    </linearGradient>
    <!-- Tranche catalogue gradient -->
    <linearGradient id="spine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a0f07;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d2510;stop-opacity:1" />
    </linearGradient>
    <!-- Couverture dégradé -->
    <linearGradient id="cover" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1a12;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#162918;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a120d;stop-opacity:1" />
    </linearGradient>
    <!-- Accent doré -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b8892a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4a843;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8892a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fond bois -->
  <rect width="1200" height="800" fill="url(#wood)"/>
  <rect width="1200" height="800" fill="url(#grain)"/>
  <!-- Vignette sombre aux coins -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" style="stop-color:#000;stop-opacity:0"/>
    <stop offset="100%" style="stop-color:#000;stop-opacity:0.5"/>
  </radialGradient>
  <rect width="1200" height="800" fill="url(#vignette)"/>

  <!-- Groupe catalogue légèrement incliné -->
  <g transform="translate(600,400) rotate(-3) translate(-230,-310)">

    <!-- Tranche (épaisseur) -->
    <rect x="0" y="0" width="28" height="620" rx="2" fill="url(#spine)"/>

    <!-- Corps catalogue -->
    <rect x="28" y="0" width="404" height="620" rx="2" fill="url(#cover)" filter="url(#shadow)"/>

    <!-- Reflet brillant -->
    <rect x="28" y="0" width="404" height="620" rx="2" fill="url(#coverSheen)"/>

    <!-- Bande dorée haut -->
    <rect x="28" y="0" width="404" height="4" fill="url(#gold)"/>
    <!-- Bande dorée bas -->
    <rect x="28" y="616" width="404" height="4" fill="url(#gold)"/>
    <!-- Filet gauche vertical doré -->
    <rect x="28" y="0" width="3" height="620" fill="url(#gold)" opacity="0.7"/>

    <!-- Zone image (simulée — gradient chaleureux) -->
    <linearGradient id="imgzone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3d2510;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#6b4226;stop-opacity:0.4" />
    </linearGradient>
    <rect x="48" y="20" width="364" height="220" rx="2" fill="url(#imgzone)"/>

    <!-- Silhouette lit stylisée -->
    <!-- Pieds lit -->
    <rect x="98" y="195" width="12" height="35" rx="2" fill="#c4841f" opacity="0.6"/>
    <rect x="330" y="195" width="12" height="35" rx="2" fill="#c4841f" opacity="0.6"/>
    <!-- Cadre lit -->
    <rect x="88" y="135" width="264" height="65" rx="4" fill="#7a4f20" opacity="0.7"/>
    <!-- Tête de lit -->
    <rect x="98" y="100" width="244" height="45" rx="6" fill="#9a6530" opacity="0.8"/>
    <!-- Panneau cannage tête de lit -->
    <rect x="108" y="105" width="224" height="35" rx="3" fill="#b8892a" opacity="0.3"/>
    <line x1="108" y1="112" x2="332" y2="112" stroke="#b8892a" stroke-width="0.8" opacity="0.4"/>
    <line x1="108" y1="119" x2="332" y2="119" stroke="#b8892a" stroke-width="0.8" opacity="0.4"/>
    <line x1="108" y1="126" x2="332" y2="126" stroke="#b8892a" stroke-width="0.8" opacity="0.4"/>
    <line x1="108" y1="133" x2="332" y2="133" stroke="#b8892a" stroke-width="0.8" opacity="0.4"/>
    <!-- Matelas -->
    <rect x="93" y="140" width="254" height="55" rx="3" fill="#e8dcc8" opacity="0.85"/>
    <!-- Oreiller -->
    <rect x="110" y="143" width="90" height="30" rx="8" fill="#fff" opacity="0.75"/>
    <rect x="240" y="143" width="90" height="30" rx="8" fill="#fff" opacity="0.75"/>
    <!-- Couverture -->
    <rect x="93" y="165" width="254" height="30" rx="3" fill="#c8b89a" opacity="0.6"/>

    <!-- Séparateur ligne dorée -->
    <line x1="48" y1="255" x2="412" y2="255" stroke="url(#gold)" stroke-width="1" opacity="0.8"/>

    <!-- LOGO zone -->
    <text x="230" y="295" font-family="Georgia, serif" font-size="11" fill="#b8892a" text-anchor="middle" letter-spacing="6" opacity="0.9">DIMEXOI</text>
    <text x="230" y="310" font-family="Georgia, serif" font-size="7" fill="#7a9a7a" text-anchor="middle" letter-spacing="4" opacity="0.7">BOIS.D'ORIENT BY DIMEXOI</text>

    <!-- Titre principal -->
    <text x="230" y="360" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1" filter="url(#textShadow)">VOTRE MOBILIER</text>
    <text x="230" y="388" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1" filter="url(#textShadow)">D'INTÉRIEUR</text>

    <!-- Sous-titre accent doré -->
    <text x="230" y="418" font-family="Georgia, serif" font-size="18" fill="url(#gold)" text-anchor="middle" letter-spacing="3" font-style="italic">en Teck</text>

    <!-- Ligne déco -->
    <line x1="130" y1="435" x2="330" y2="435" stroke="url(#gold)" stroke-width="0.8" opacity="0.6"/>
    <circle cx="230" cy="435" r="3" fill="url(#gold)" opacity="0.8"/>

    <!-- Description -->
    <text x="230" y="465" font-family="Arial, sans-serif" font-size="8.5" fill="#9ab89a" text-anchor="middle" letter-spacing="2" opacity="0.9">COLLECTION AVRIL 2026</text>
    <text x="230" y="483" font-family="Arial, sans-serif" font-size="8" fill="#6a8a6a" text-anchor="middle" letter-spacing="1.5" opacity="0.8">Chambres · Salons · Salles de bain</text>

    <!-- Zone bas -->
    <rect x="48" y="535" width="364" height="1" fill="url(#gold)" opacity="0.4"/>

    <!-- Showroom info -->
    <text x="230" y="560" font-family="Arial, sans-serif" font-size="7.5" fill="#7a9a7a" text-anchor="middle" letter-spacing="2" opacity="0.8">2 SHOWROOMS · LA RÉUNION</text>
    <text x="230" y="575" font-family="Arial, sans-serif" font-size="7" fill="#556a55" text-anchor="middle" letter-spacing="1.5" opacity="0.7">dimexoi.fr</text>

    <!-- Pages visibles (effet livre) -->
    <rect x="432" y="4" width="6" height="612" fill="#e8dcc8" opacity="0.08"/>
    <rect x="438" y="8" width="4" height="604" fill="#e8dcc8" opacity="0.05"/>

  </g>

  <!-- Ombre portée au sol -->
  <ellipse cx="590" cy="760" rx="220" ry="25" fill="#000" opacity="0.35"/>
</svg>
